<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Code runner. Write and execute HTML, CSS, JavaScript instantly with live preview and line numbers.">
    <meta name="keywords" content="code runner, online editor, javascript, html, css">
    <meta name="theme-color" content="#2563eb">

    <title>Code Runner - Online JavaScript HTML CSS Editor</title>
    <link rel="canonical" href="https://youant.me/code-runner/">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80' fill='%232563eb'>💻</text></svg>">
    <link rel="stylesheet" href="/style.css">

    <meta property="og:title" content="Code Runner - Online Editor">
    <meta property="og:description" content="Execute HTML CSS JavaScript code with live preview.">
    <meta property="og:url" content="https://youant.me/code-runner/">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Code Runner",
      "description": "Online code editor with live preview",
      "url": "https://youant.me/code-runner/",
      "applicationCategory": "DeveloperApplication"
    }
    </script>

    <style>
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            min-height: 600px;
            margin: 1.5rem 0;
        }

        .editor-section, .preview-section {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .section-header {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            padding: 1rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tabs {
            display: flex;
            background: #f8f8f8;
            border-bottom: 1px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            border: none;
            cursor: pointer;
            font-weight: 500;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
            background: white;
        }

        .tab:hover:not(.active) {
            background: #f0f0f0;
        }

        .content {
            flex: 1;
            overflow: auto;
            display: flex;
        }

        .line-numbers {
            background: #1e1e1e;
            color: #666;
            padding: 1rem 1rem;
            text-align: right;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            user-select: none;
            white-space: pre;
            border-right: 1px solid #e0e0e0;
            overflow: hidden;
        }

        .code-input {
            flex: 1;
            padding: 1rem;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            resize: none;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            outline: none;
        }

        .code-input:focus {
            background: #252525;
        }

        .preview-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .controls .btn {
            flex: 1;
            min-width: 120px;
        }

        @media (max-width: 1024px) {
            .editor-container {
                grid-template-columns: 1fr;
                min-height: auto;
            }
            .editor-section, .preview-section {
                min-height: 400px;
            }
        }

        @media (max-width: 768px) {
            .controls .btn {
                flex: 1;
                min-width: 100px;
                font-size: 0.9rem;
                padding: 0.6rem 1rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo"><a href="/">⚡ Free Tools</a></div>
        </div>
    </nav>

    <div class="header">
        <div class="container">
            <h1>Code Runner</h1>
            <p>Write HTML, CSS, JavaScript and see results instantly</p>
        </div>
    </div>

    <main class="container">
        <section>
            <div class="controls">
                <button class="btn" id="runBtn">▶ Run</button>
                <button class="btn btn-secondary" id="resetBtn">↻ Reset</button>
                <button class="btn btn-secondary" id="downloadBtn">⬇ Download</button>
            </div>

            <div class="editor-container">
                <div class="editor-section">
                    <div class="section-header">
                        <span>Editor</span>
                        <span id="lineCount" style="font-size: 0.85rem;">1 line</span>
                    </div>
                    <div class="tabs">
                        <button class="tab active" data-tab="html">HTML</button>
                        <button class="tab" data-tab="css">CSS</button>
                        <button class="tab" data-tab="js">JavaScript</button>
                    </div>
                    <div class="content">
                        <div class="line-numbers" id="lineNumbers"></div>
                        <textarea id="htmlEditor" class="code-input" placeholder="&lt;h1&gt;Hello&lt;/h1&gt;"></textarea>
                    </div>
                    <textarea id="cssEditor" class="code-input" style="display: none;" placeholder="body { font-family: system-ui; }"></textarea>
                    <textarea id="jsEditor" class="code-input" style="display: none;" placeholder="console.log('Hello');"></textarea>
                </div>

                <div class="preview-section">
                    <div class="section-header">Live Preview</div>
                    <iframe id="preview" class="preview-iframe" sandbox="allow-scripts allow-same-origin" title="Live preview"></iframe>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 Free Tools.</p>
        </div>
    </footer>

    <script>
        const htmlEditor = document.getElementById('htmlEditor');
        const cssEditor = document.getElementById('cssEditor');
        const jsEditor = document.getElementById('jsEditor');
        const preview = document.getElementById('preview');
        const lineNumbers = document.getElementById('lineNumbers');
        const lineCount = document.getElementById('lineCount');

        const defaultHTML = `<!DOCTYPE html>
<html>
<head>
    <title>Code Runner</title>
</head>
<body>
    <h1>Hello World!</h1>
    <p>Edit code and see results instantly</p>
    <button id="btn">Click Me</button>
</body>
</html>`;

        const defaultCSS = `body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 2rem;
    background: #f5f5f5;
    color: #333;
}

h1 { margin-bottom: 1rem; }
button {
    padding: 0.75rem 1.5rem;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover { background: #1e40af; }`;

        const defaultJS = `document.getElementById('btn')?.addEventListener('click', () => {
    alert('Button clicked! 🎉');
});`;

        function updateLineNumbers(editor) {
            const lines = editor.value.split('\n').length;
            let nums = '';
            for (let i = 1; i <= lines; i++) nums += i + '\n';
            lineNumbers.textContent = nums;
            lineCount.textContent = lines + ' line' + (lines !== 1 ? 's' : '');
        }

        function updatePreview() {
            const html = htmlEditor.value;
            const css = cssEditor.value;
            const js = jsEditor.value;
            const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`;
            preview.srcdoc = doc;
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.code-input').forEach(e => e.style.display = 'none');
                tab.classList.add('active');
                const editor = document.getElementById(tab.dataset.tab + 'Editor');
                editor.style.display = 'block';
                editor.focus();
                updateLineNumbers(editor);
            });
        });

        htmlEditor.addEventListener('input', () => { updateLineNumbers(htmlEditor); updatePreview(); });
        cssEditor.addEventListener('input', updatePreview);
        jsEditor.addEventListener('input', updatePreview);

        document.getElementById('runBtn').addEventListener('click', updatePreview);
        document.getElementById('resetBtn').addEventListener('click', () => {
            htmlEditor.value = defaultHTML;
            cssEditor.value = defaultCSS;
            jsEditor.value = defaultJS;
            updateLineNumbers(htmlEditor);
            updatePreview();
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const content = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${cssEditor.value}</style></head><body>${htmlEditor.value}<script>${jsEditor.value}<\/script></body></html>`;
            const blob = new Blob([content], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'code.html';
            a.click();
        });

        htmlEditor.value = defaultHTML;
        cssEditor.value = defaultCSS;
        jsEditor.value = defaultJS;
        updateLineNumbers(htmlEditor);
        updatePreview();
    </script>
</body>
</html>
